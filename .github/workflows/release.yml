name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Verify tag matches versionName
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          GRADLE_VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          if [ "$TAG_VERSION" != "$GRADLE_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match versionName $GRADLE_VERSION in app/build.gradle.kts"
            exit 1
          fi

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "Missing secret KEYSTORE_BASE64"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "${GITHUB_WORKSPACE}/release.keystore"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build signed release APK
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Prepare release assets and notes
        id: prepare
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APK_SRC="app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK_SRC" ]; then
            echo "Expected APK not found at $APK_SRC"
            find app/build/outputs -type f -name '*.apk' || true
            exit 1
          fi
          cp "$APK_SRC" "BlueDeck-${VERSION}.apk"
          echo "apk=BlueDeck-${VERSION}.apk" >> "$GITHUB_OUTPUT"

          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found = 1; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > release_notes.md

          if [ ! -s release_notes.md ]; then
            echo "No CHANGELOG.md section for [$VERSION]; using generated notes only." > release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: BlueDeck ${{ github.ref_name }}
          body_path: release_notes.md
          generate_release_notes: true
          files: ${{ steps.prepare.outputs.apk }}
          fail_on_unmatched_files: true
